apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  # these are replica set labels
  labels:
    project: roboshop
    component: mysql
    tier: db
spec:
  replicas: 1
  selector:
    # these labels are used to select pods
    matchLabels:
      project: roboshop
      component: mysql
      tier: db
  # pod definition
  template:
    metadata:
      labels:
        project: roboshop
        component: mysql
        tier: db
    spec:
      serviceAccount: my-serviceaccount
      initContainers:
      - name: fetch-secret
        image: amazon/aws-cli
        command:
        - sh
        - -c
        - |
            aws secretsmanager get-secret-value --secret-id Mysql/Password --query 'SecretString' --output text | jq -r '.["mysql-password"]' > /tmp/mysql-root-password.txt
        volumeMounts:
        - name: mysql-secret
          mountPath: /tmp
      containers:
      - name: mysql
        image: mamidalahemanchandra/mysql:v2
        imagePullPolicy: Always
        volumeMounts:
        - name: mysql-secret
          mountPath: /tmp
      volumes:
        - name: mysql-secret
          emptyDir: {}
